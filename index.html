<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Futur en Commun</title>
  <meta name="description" content="Futur en Commun est une application éco-citoyenne locale pour signaler, soutenir et agir concrètement près de chez soi." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #faf9f4;
      --surface: #ffffff;
      --green: #8FAE3E;
      --green-soft: #EEF5DE;
      --yellow-soft: #F6F0CC;
      --rose-soft: #F3E8E1;
      --text: #2F2F2F;
      --muted: #7E8478;
      --line: #ECE8DC;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 36px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .topbar img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 20px;
      background: white;
      flex-shrink: 0;
    }

    .brand {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 430px);
      align-items: center;
      gap: 48px;
    }

    .hero-left {
      max-width: 620px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--green-soft);
      color: var(--green);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2.5rem, 5vw, 4.3rem);
      line-height: 0.98;
      letter-spacing: -0.06em;
      font-weight: 800;
      max-width: 9ch;
    }

    .subtitle {
      margin: 0 0 26px;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.7;
      max-width: 34ch;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .btn {
      min-height: 56px;
      padding: 0 24px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 700;
      transition: transform 0.15s ease, filter 0.15s ease;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(0.98);
    }

    .btn-primary {
      background: var(--green);
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(143, 174, 62, 0.18);
    }

    .btn-secondary {
      background: var(--yellow-soft);
      color: #4A3F18;
    }

    .phone-wrap {
      display: flex;
      justify-content: center;
    }

    .phone {
      width: 100%;
      max-width: 360px;
      background: #ffffff;
      border: 7px solid #232a1a;
      border-radius: 38px;
      padding: 16px 12px 14px;
      position: relative;
      box-shadow: 0 20px 40px rgba(35, 42, 26, 0.12);
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      border-radius: 999px;
      background: #232a1a;
      z-index: 3;
    }

    .screen {
      overflow: hidden;
      border-radius: 26px;
      background: #ffffff;
      min-height: 520px;
    }

    .screen img {
      width: 100%;
      height: auto;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    @media (max-width: 920px) {
      .page {
        justify-content: flex-start;
        padding-top: 22px;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 28px;
      }

      .hero-left {
        max-width: none;
      }

      h1 {
        max-width: none;
      }

      .subtitle {
        max-width: none;
      }

      .topbar img {
        width: 64px;
        height: 64px;
      }

      .brand {
        font-size: 1.6rem;
      }
    }

    @media (max-width: 560px) {
      .page {
        padding-left: 16px;
        padding-right: 16px;
      }

      .topbar {
        margin-bottom: 24px;
      }

      .brand {
        font-size: 1.4rem;
      }

      h1 {
        font-size: 2.5rem;
        line-height: 1.02;
      }

      .subtitle {
        font-size: 1rem;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .phone {
        max-width: 320px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <img src="./logo.png" alt="Logo Futur en Commun" />
      <div class="brand">Futur en Commun</div>
    </div>

    <section class="hero">
      <div class="hero-left">
        <div class="eyebrow">🌱 Impact local et concret</div>

        <h1>Agir localement pour un environnement plus propre.</h1>

        <p class="subtitle">
          Signalez, soutenez et participez à des actions concrètes près de chez vous.
        </p>

        <div class="actions">
          <a class="btn btn-primary" href="https://futurencommun.glide.page" target="_blank" rel="noopener noreferrer">
            Accéder à l’application
          </a>
        </div>
      </div>

      <div class="phone-wrap">
        <div class="phone">
          <div class="screen">
            <img src="./app.png" alt="Capture de l’application Futur en Commun" />
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
