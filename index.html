<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Futur en Commun</title>
  <meta name="description" content="Application éco-citoyenne locale pour signaler, soutenir et agir concrètement près de chez soi." />

  <style>
    :root {
      --bg: #FAF9F4;
      --green: #8FAE3E;
      --text: #2F2F2F;
      --muted: #7F8478;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
      padding: 30px 20px;
    }

    /* HEADER */
    .top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .top img {
      width: 48px;
      height: 48px;
      border-radius: 12px;
    }

    .brand {
      font-weight: 700;
      font-size: 1.2rem;
    }

    /* HERO */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 40px;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.1;
      margin: 0 0 16px;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .cta {
      display: inline-block;
      padding: 14px 22px;
      background: var(--green);
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 600;
    }

    /* PHONE */
    .phone {
      max-width: 280px;
      border: 6px solid #1F2A18;
      border-radius: 30px;
      padding: 10px;
      margin: auto;
      background: white;
    }

    .phone img {
      width: 100%;
      border-radius: 20px;
      display: block;
    }

    /* MOBILE */
    @media (max-width: 800px) {
      .hero {
        grid-template-columns: 1fr;
        text-align: left;
      }

      .phone {
        margin-top: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="wrap">

    <!-- HEADER -->
    <div class="top">
      <img src="./logo.png" alt="Logo Futur en Commun">
      <div class="brand">Futur en Commun</div>
    </div>

    <!-- HERO -->
    <div class="hero">

      <div>
        <h1>
          Agir localement<br>
          pour un environnement plus propre.
        </h1>

        <div class="subtitle">
          Signalez, soutenez et participez à des actions concrètes près de chez vous.
        </div>

        <a class="cta" href="TON LIEN GLIDE ICI">
          Accéder à l’application
        </a>
      </div>

      <div class="phone">
        <img src="./app.png" alt="Application Futur en Commun">
      </div>

    </div>

  </div>

</body>
</html>
