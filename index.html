<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futur en Commun</title>
  <meta name="description" content="Futur en Commun est une application éco-citoyenne locale pour signaler, soutenir et agir concrètement près de chez soi." />
  <style>
    :root {
      --bg: #faf9f4;
      --card: #ffffff;
      --green: #8FAE3E;
      --text: #2F2F2F;
      --muted: #7F8478;
      --line: #ECE8DC;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      min-height: 100vh;
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .top img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 16px;
      background: white;
    }

    .brand {
      font-size: 1.35rem;
      font-weight: 700;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 40px;
      align-items: center;
    }

    h1 {
      font-size: clamp(2.6rem, 6vw, 5rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
      margin: 0 0 18px;
      font-weight: 800;
      max-width: 8.5ch;
    }

    .subtitle {
      font-size: 1.18rem;
      line-height: 1.65;
      color: var(--muted);
      margin: 0 0 26px;
      max-width: 32ch;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 0 26px;
      background: var(--green);
      color: white;
      text-decoration: none;
      border-radius: 18px;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 10px 24px rgba(143, 174, 62, 0.18);
    }

    .visual {
      display: flex;
      justify-content: center;
    }

    .phone {
      width: min(100%, 360px);
      background: #fff;
      border: 7px solid #252b1d;
      border-radius: 38px;
      padding: 16px 12px;
      position: relative;
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      border-radius: 999px;
      background: #252b1d;
      z-index: 2;
    }

    .screen {
      border-radius: 26px;
      overflow: hidden;
      background: white;
    }

    .screen img {
      width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 28px;
      }

      .wrap {
        justify-content: flex-start;
        padding-top: 22px;
      }

      h1 {
        max-width: none;
      }

      .subtitle {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <img src="./Futur en commun version carrée.png" alt="Logo Futur en Commun" />
      <div class="brand">Futur en Commun</div>
    </div>

    <section class="hero">
      <div>
        <h1>Agir localement pour un environnement plus propre.</h1>
        <p class="subtitle">
          Signalez, soutenez et participez à des actions concrètes près de chez vous.
        </p>
        <a class="cta" href="https://futurencommun.glide.page" target="_blank" rel="noopener noreferrer">
          Accéder à l’application
        </a>
      </div>

      <div class="visual">
        <div class="phone">
          <div class="screen">
            <img src="./app-home.png" alt="Capture de l’application Futur en Commun" />
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
